<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc mừng 8/3</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family: Arial, sans-serif;
    text-align:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    animation: fadeIn 2s;
}

h1{
    color:#ff4081;
    font-size:40px;
}

p{
    font-size:20px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#ff4081;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    background:#e91e63;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h1>🌸 Happy Women's Day 8/3 🌸</h1>
    <p>Tại sao phải cần hoa khi chị Thảo My đã là bông hoa? </p>
    <p>Chúc Chị My luôn xinh như mấy bà tung của, giàu nhứt vách, và được sớm có được người chăm lo cho mình.</p>
    <p>Đi ra đường là auto có người khen “ My hôm nay xinh theeee”. </p>
    <p>Chúc chị My ngày 8/3 thật nhiều niềm vui💐</p>

    <button onclick="showMessage()">Nhấn vào đây</button>

    <p id="msg"></p>
</div>

<script>
function showMessage(){
    document.getElementById("msg").innerHTML =
    "💖 Một bông hoa dành tặng chị My 💖 <br><br>" +
    "<img src='Hoa.jpg'>";
}
</script>

</body>
</html>
